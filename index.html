<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Möbius IFS — General</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; font-family: monospace; }
  canvas { display: block; margin: auto; position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
  .controls {
    position: fixed; top: 10px; left: 10px; z-index: 10;
    background: rgba(0,0,0,0.7); padding: 10px 14px; border-radius: 6px;
    color: #aaa; font-size: 12px; display: flex; flex-direction: column; gap: 6px;
  }
  .controls label { cursor: pointer; white-space: nowrap; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .controls input[type=range] { width: 90px; }
  .controls select { background: #333; color: #aaa; border: 1px solid #555; border-radius: 3px; padding: 2px; }
  #fps { text-align: right; }
  .disc-label {
    position: absolute; font-size: 13px; font-family: monospace;
    text-align: center; pointer-events: none;
    text-shadow: 0 0 4px #000, 0 0 4px #000;
  }
</style>
</head>
<body>
<div class="controls">
  <label>Funcs: <select id="nfuncs">
    <option value="1">1</option><option value="2">2</option>
    <option value="3" selected>3</option><option value="4">4</option>
    <option value="5">5</option><option value="6">6</option>
  </select></label>
  <label>Num°: <select id="numdeg">
    <option value="0">0</option><option value="1" selected>1</option>
    <option value="2">2</option><option value="3">3</option><option value="4">4</option>
    <option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option>
    <option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option>
    <option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option>
    <option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option>
  </select></label>
  <label>Num^: <select id="numexp">
    <option value="1" selected>1</option><option value="2">2</option><option value="3">3</option>
    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
    <option value="7">7</option><option value="8">8</option>
  </select></label>
  <label>Den°: <select id="dendeg">
    <option value="0">0</option><option value="1" selected>1</option>
    <option value="2">2</option><option value="3">3</option><option value="4">4</option>
    <option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option>
    <option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option>
    <option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option>
    <option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option>
  </select></label>
  <label>Den^: <select id="denexp">
    <option value="1" selected>1</option><option value="2">2</option><option value="3">3</option>
    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
    <option value="7">7</option><option value="8">8</option>
  </select></label>
  <label>Samples: <select id="nsamp">
    <option value="6">6×6</option><option value="9">9×9</option>
    <option value="12" selected>12×12</option><option value="15">15×15</option>
    <option value="18">18×18</option><option value="21">21×21</option>
    <option value="24">24×24</option>
  </select></label>
  <label>Speed: <input type="range" id="speed" min="0" max="200" value="25"></label>
  <label>Color: <input type="range" id="colorwt" min="100" max="500" value="200"></label>
  <label><input type="checkbox" id="showpermap"> Components</label>
  <label id="gridlabel" style="display:none"><input type="checkbox" id="showgrid" checked> Grid</label>
  <button id="randomize">Randomize</button>
  <span id="fps"></span>
</div>
<div id="labels"></div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
let initialized = false;

// Initial SIZE based on window (matches original single-disc quality)
const SIZE = Math.min(window.innerWidth, window.innerHeight);
const SCALE = 4.0;

function resize() {
  const multi = initialized && document.getElementById('showpermap').checked;
  if (multi) {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    updateLabels();
  } else {
    const s = Math.min(window.innerWidth, window.innerHeight);
    canvas.width = s; canvas.height = s;
    canvas.style.width = s + 'px'; canvas.style.height = s + 'px';
    if (initialized) clearLabels();
  }
}
resize();
window.addEventListener('resize', resize);

const gl = canvas.getContext('webgl2');
gl.getExtension('EXT_color_buffer_float');
gl.getExtension('OES_texture_float_linear');

function makeTex() {
  const t = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, SIZE, SIZE, 0, gl.RGBA, gl.FLOAT, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  return t;
}
function makeFBO(t) {
  const f = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
  return f;
}

const init = new Float32Array(SIZE*SIZE*4);
for (let i = 0; i < SIZE*SIZE; i++) { init[i*4]=1; init[i*4+1]=1; init[i*4+2]=1; init[i*4+3]=1; }

const texA=makeTex(), texB=makeTex(), texC=makeTex(), texT=makeTex();
for (const t of [texA,texB,texC,texT]) {
  gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, SIZE, SIZE, 0, gl.RGBA, gl.FLOAT, init);
}
const fboA=makeFBO(texA), fboB=makeFBO(texB), fboC=makeFBO(texC), fboT=makeFBO(texT);

const qb=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, qb);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

function sh(s,t){const o=gl.createShader(t);gl.shaderSource(o,s);gl.compileShader(o);
  if(!gl.getShaderParameter(o,gl.COMPILE_STATUS))throw gl.getShaderInfoLog(o);return o;}
function pr(v,f){const p=gl.createProgram();gl.attachShader(p,sh(v,gl.VERTEX_SHADER));
  gl.attachShader(p,sh(f,gl.FRAGMENT_SHADER));gl.linkProgram(p);return p;}

const VS=`#version 300 es
in vec2 pos; out vec2 uv;
void main(){uv=pos*0.5+0.5;gl_Position=vec4(pos,0,1);}`;

const iterProg = pr(VS, `#version 300 es
precision highp float;
in vec2 uv; out vec4 fragColor;
uniform sampler2D uD;
uniform float a[252];
uniform float sc;
uniform float pixSize;
uniform int nT;
uniform float cw;
uniform int numDeg;
uniform int denDeg;
uniform int numExp;
uniform int denExp;
uniform int singleT;
uniform int doAA;

vec2 cm(vec2 a,vec2 b){return vec2(a.x*b.x-a.y*b.y,a.x*b.y+a.y*b.x);}

vec2 cpow(vec2 z, int n) {
  if (n == 0) return vec2(1.0, 0.0);
  if (n == 1) return z;
  vec2 r = vec2(1.0, 0.0);
  for (int i = 0; i < 8; i++) {
    if (i >= n) break;
    r = cm(r, z);
  }
  return r;
}

vec2 evalPoly(vec2 w, int off, int deg) {
  vec2 r = vec2(cos(a[off]), sin(a[off]));
  for (int k=1; k<=20; k++) {
    if (k > deg) break;
    r = cm(r, w) + vec2(cos(a[off+k]), sin(a[off+k]));
  }
  return r;
}

vec2 evalPolyDeriv(vec2 w, int off, int deg) {
  if (deg == 0) return vec2(0.0);
  vec2 r = vec2(cos(a[off]), sin(a[off])) * float(deg);
  for (int k=1; k<=19; k++) {
    if (k >= deg) break;
    r = cm(r, w) + vec2(cos(a[off+k]), sin(a[off+k])) * float(deg - k);
  }
  return r;
}

vec3 colorWeight(int t) {
  if(t==0) return vec3(cw, 1.0, 1.0);
  if(t==1) return vec3(1.0, cw, 1.0);
  if(t==2) return vec3(1.0, 1.0, cw);
  if(t==3) return vec3(cw, cw, 1.0);
  if(t==4) return vec3(cw, 1.0, cw);
  return vec3(1.0, cw, cw);
}

vec3 sampleAt(vec2 w){
  float R2 = sc*sc*0.25;
  if(dot(w,w) > R2) return vec3(0.0);
  int nCoeffs = numDeg + 1 + denDeg + 1;
  vec3 acc = vec3(0.0);
  vec3 wTotal = vec3(0.0);
  for(int t=0;t<6;t++){
    if(t>=nT) break;
    if(singleT >= 0 && t != singleT) continue;
    int base = t * 42;
    int numOff = base;
    int denOff = base + numDeg + 1;

    vec2 P = evalPoly(w, numOff, numDeg);
    vec2 Q = evalPoly(w, denOff, denDeg);
    vec2 N = cpow(P, numExp);
    vec2 D = cpow(Q, denExp);
    float ds = max(dot(D,D), 1e-10);
    vec2 z = vec2(dot(N,D)/ds, (N.y*D.x - N.x*D.y)/ds);

    vec2 Pp = evalPolyDeriv(w, numOff, numDeg);
    vec2 Qp = evalPolyDeriv(w, denOff, denDeg);
    vec2 Np = cm(cpow(P, numExp-1), Pp) * float(numExp);
    vec2 Dp = cm(cpow(Q, denExp-1), Qp) * float(denExp);
    vec2 deriv_num = cm(Np, D) - cm(N, Dp);
    float j = min(dot(deriv_num,deriv_num) / (ds*ds), 10.0);

    if(dot(z,z) <= R2){
      vec2 s = z/sc + 0.5;
      vec3 sampled = texture(uD, s).rgb;
      vec3 cwt = colorWeight(t);
      acc += sampled * j * cwt;
      wTotal += cwt;
    }
  }
  return vec3(
    wTotal.r > 0.0 ? acc.r / wTotal.r : 0.0,
    wTotal.g > 0.0 ? acc.g / wTotal.g : 0.0,
    wTotal.b > 0.0 ? acc.b / wTotal.b : 0.0
  );
}

void main(){
  vec2 w=(uv-0.5)*sc;
  float R2 = sc*sc*0.25;
  if(dot(w,w) > R2){ fragColor=vec4(0.001,0.001,0.001,1); return; }
  vec3 v;
  if (doAA == 1) {
    float step=pixSize*sc/4.0;
    v=vec3(0.0);
    for(int iy=0;iy<4;iy++)
      for(int ix=0;ix<4;ix++)
        v+=sampleAt(w+vec2((float(ix)-1.5)*step,(float(iy)-1.5)*step));
    v /= 16.0;
  } else {
    v = sampleAt(w);
  }
  v = clamp(v, vec3(0.001), vec3(100.0));
  fragColor=vec4(v, 1.0);
}`);

const normProg = pr(VS, `#version 300 es
precision highp float;
in vec2 uv; out vec4 fragColor;
uniform sampler2D uD;
uniform vec3 uS;
uniform vec3 uBoost;
void main(){
  vec3 v = texture(uD,uv).rgb * uS + uBoost;
  v = clamp(v, vec3(0.001), vec3(100.0));
  fragColor=vec4(v, 1.0);
}`);

const dispProg = pr(VS, `#version 300 es
precision highp float;
in vec2 uv; out vec4 fragColor;
uniform sampler2D uD;
uniform vec3 uLM;
uniform float uG;
uniform vec3 uTint;
uniform int uGrid;
uniform float uSc;
uniform int uBorder;
void main(){
  vec2 c = uv - 0.5;
  float r2 = dot(c,c);
  if(r2 > 0.25){ fragColor=vec4(0,0,0,1); return; }
  vec3 d = texture(uD,uv).rgb * uTint;
  vec3 v;
  v.r = uLM.r>0.001 ? pow(clamp(log(1.0+abs(d.r))/uLM.r,0.0,1.0),uG) : 0.0;
  v.g = uLM.g>0.001 ? pow(clamp(log(1.0+abs(d.g))/uLM.g,0.0,1.0),uG) : 0.0;
  v.b = uLM.b>0.001 ? pow(clamp(log(1.0+abs(d.b))/uLM.b,0.0,1.0),uG) : 0.0;
  if (uBorder == 1) {
    float edge = smoothstep(0.0, 0.003, 0.5 - sqrt(r2));
    v = mix(vec3(0.35), v, edge);
  }
  if (uGrid == 1) {
    vec2 w = (uv - 0.5) * uSc;
    float spacing = uSc / 16.0;
    float lineW = uSc * 0.003;
    float gx = abs(mod(w.x+spacing*0.5,spacing)-spacing*0.5);
    float gy = abs(mod(w.y+spacing*0.5,spacing)-spacing*0.5);
    float g = smoothstep(lineW, 0.0, min(gx, gy));
    float circle = smoothstep(lineW*2.5, 0.0, abs(length(w)-uSc*0.5));
    v = mix(v, vec3(1.0), max(g, circle) * 0.7);
  }
  fragColor=vec4(v,1);
}`);

const gridProg = pr(VS, `#version 300 es
precision highp float;
in vec2 uv; out vec4 fragColor;
uniform sampler2D uD;
uniform float sc;
void main(){
  vec3 d = texture(uD, uv).rgb;
  vec2 w = (uv - 0.5) * sc;
  float spacing = sc / 16.0;
  float lineW = sc * 0.003;
  float gx = abs(mod(w.x + spacing*0.5, spacing) - spacing*0.5);
  float gy = abs(mod(w.y + spacing*0.5, spacing) - spacing*0.5);
  float g = smoothstep(lineW, 0.0, min(gx, gy));
  float circle = smoothstep(lineW*2.5, 0.0, abs(length(w) - sc*0.5));
  d += vec3(max(g, circle) * 3.0);
  fragColor = vec4(d, 1.0);
}`);

const baseAngles=new Float32Array(252), vels=new Float32Array(252);
for(let i=0;i<252;i++){baseAngles[i]=Math.random()*Math.PI*2; vels[i]=(Math.random()-0.5)*0.4;}

let nFuncs=3, pp=0, frame=0, lastT=performance.now(), fpsS=0;
const logMax=new Float32Array([1,1,1]);
const phases=new Float32Array(252);
const runAvg=[1,1,1];
let currentAng=new Float32Array(252);

/* ---- Multi-disc layout ---- */

function gridDims(n) {
  if (n <= 3) return [n, 1];
  if (n <= 8) return [Math.ceil(n/2), 2];
  return [Math.ceil(n/3), 3];
}

function getLayout() {
  const total = 1 + nFuncs;
  const [cols, rows] = gridDims(total);
  const cellW = canvas.width / cols;
  const cellH = canvas.height / rows;
  const discSize = Math.floor(Math.min(cellW, cellH * 0.88));
  const cells = [];
  for (let i = 0; i < total; i++) {
    const c = i % cols;
    const r = Math.floor(i / cols);
    const cx = (c + 0.5) * cellW;
    const cy = (r + 0.44) * cellH;
    cells.push({
      cssX: Math.floor(cx - discSize / 2),
      cssY: Math.floor(cy - discSize / 2),
      glX:  Math.floor(cx - discSize / 2),
      glY:  Math.floor(canvas.height - cy - discSize / 2),
      size: discSize
    });
  }
  return { cells, cols, rows };
}

const labelColors = ['#ffffff','#ff6666','#66ff66','#6666ff','#ffff66','#ff66ff','#66ffff'];
const colorTags  = ['','R','G','B','RG','RB','GB'];

function updateLabels() {
  const layout = getLayout();
  const container = document.getElementById('labels');
  container.innerHTML = '';
  for (let i = 0; i < 1 + nFuncs; i++) {
    const cell = layout.cells[i];
    const lbl = document.createElement('div');
    lbl.className = 'disc-label';
    lbl.style.left  = cell.cssX + 'px';
    lbl.style.top   = (cell.cssY + cell.size + 2) + 'px';
    lbl.style.width  = cell.size + 'px';
    lbl.style.color  = labelColors[i];
    lbl.textContent  = i === 0 ? 'Combined' : String.fromCharCode(0x66) + String.fromCharCode(0x2080+i) + ' (' + colorTags[i] + ')';
    container.appendChild(lbl);
  }
}

function clearLabels() {
  document.getElementById('labels').innerHTML = '';
}

initialized = true;

/* ---- Drawing helpers ---- */

function drawQ(p){
  const a=gl.getAttribLocation(p,'pos');
  gl.bindBuffer(gl.ARRAY_BUFFER,qb);
  gl.enableVertexAttribArray(a);
  gl.vertexAttribPointer(a,2,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

function resetImage(){
  frame=0; runAvg[0]=1; runAvg[1]=1; runAvg[2]=1;
  const d=new Float32Array(SIZE*SIZE*4);
  for(let i=0;i<SIZE*SIZE;i++){d[i*4]=1;d[i*4+1]=1;d[i*4+2]=1;d[i*4+3]=1;}
  for(const t of[texA,texB,texC]){
    gl.bindTexture(gl.TEXTURE_2D,t);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA32F,SIZE,SIZE,0,gl.RGBA,gl.FLOAT,d);
  }
  logMax[0]=1; logMax[1]=1; logMax[2]=1;
}

/* ---- Iteration ---- */

function setIterUniforms(srcTex, ang, st, aa) {
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, srcTex);
  gl.uniform1i(gl.getUniformLocation(iterProg,'uD'),0);
  gl.uniform1fv(gl.getUniformLocation(iterProg,'a'),ang);
  gl.uniform1f(gl.getUniformLocation(iterProg,'sc'),SCALE);
  gl.uniform1f(gl.getUniformLocation(iterProg,'pixSize'),1.0/SIZE);
  gl.uniform1i(gl.getUniformLocation(iterProg,'nT'),nFuncs);
  gl.uniform1f(gl.getUniformLocation(iterProg,'cw'),document.getElementById('colorwt').value/100.0);
  gl.uniform1i(gl.getUniformLocation(iterProg,'numDeg'),parseInt(document.getElementById('numdeg').value));
  gl.uniform1i(gl.getUniformLocation(iterProg,'denDeg'),parseInt(document.getElementById('dendeg').value));
  gl.uniform1i(gl.getUniformLocation(iterProg,'numExp'),parseInt(document.getElementById('numexp').value));
  gl.uniform1i(gl.getUniformLocation(iterProg,'denExp'),parseInt(document.getElementById('denexp').value));
  gl.uniform1i(gl.getUniformLocation(iterProg,'singleT'),st);
  gl.uniform1i(gl.getUniformLocation(iterProg,'doAA'),aa);
}

function doIter(ang){
  const rT=pp===0?texA:texB, wFBO=pp===0?fboB:fboA;
  gl.bindFramebuffer(gl.FRAMEBUFFER,fboC);
  gl.viewport(0,0,SIZE,SIZE);
  gl.useProgram(iterProg);
  setIterUniforms(rT, ang, -1, 1);
  drawQ(iterProg);

  const buf=new Float32Array(4);
  let sums=[0,0,0], cnt=0;
  const ns=parseInt(document.getElementById('nsamp').value);
  const st=Math.floor(SIZE/ns);
  for(let y=0;y<SIZE;y+=st)for(let x=0;x<SIZE;x+=st){
    gl.readPixels(x,y,1,1,gl.RGBA,gl.FLOAT,buf);
    sums[0]+=buf[0]; sums[1]+=buf[1]; sums[2]+=buf[2]; cnt++;
  }
  for(let c=0;c<3;c++) if(!isFinite(sums[c])) { resetImage(); pp=1-pp; return; }
  if(sums[0]+sums[1]+sums[2] < 0.001*cnt){ resetImage(); pp=1-pp; return; }
  for(let c=0;c<3;c++){
    const avg = sums[c]/cnt;
    if(!isFinite(avg)) { resetImage(); pp=1-pp; return; }
    const desired = avg > 1e-10 ? Math.min(0.5/avg, 10.0) : 1.0;
    runAvg[c] = runAvg[c]*0.98 + desired*0.02;
  }
  const sc = new Float32Array([runAvg[0], runAvg[1], runAvg[2]]);
  const boost = new Float32Array(3);

  gl.bindFramebuffer(gl.FRAMEBUFFER,wFBO);
  gl.viewport(0,0,SIZE,SIZE);
  gl.useProgram(normProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D,texC);
  gl.uniform1i(gl.getUniformLocation(normProg,'uD'),0);
  gl.uniform3fv(gl.getUniformLocation(normProg,'uS'),sc);
  gl.uniform3fv(gl.getUniformLocation(normProg,'uBoost'),boost);
  drawQ(normProg);
  pp=1-pp;
}

/* ---- Display ---- */

function setDispUniforms(tex, tint, grid, border) {
  gl.useProgram(dispProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.uniform1i(gl.getUniformLocation(dispProg,'uD'),0);
  gl.uniform3fv(gl.getUniformLocation(dispProg,'uLM'),logMax);
  gl.uniform1f(gl.getUniformLocation(dispProg,'uG'),0.45);
  gl.uniform3fv(gl.getUniformLocation(dispProg,'uTint'),tint);
  gl.uniform1i(gl.getUniformLocation(dispProg,'uGrid'),grid?1:0);
  gl.uniform1f(gl.getUniformLocation(dispProg,'uSc'),SCALE);
  gl.uniform1i(gl.getUniformLocation(dispProg,'uBorder'),border?1:0);
}

function displayDisc(tex, cell, tint, grid) {
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(cell.glX, cell.glY, cell.size, cell.size);
  setDispUniforms(tex, tint, grid, true);
  drawQ(dispProg);
}

function display(){
  const srcTex = pp===0?texA:texB;

  // Update logMax from combined image
  if(frame%10===0){
    const rFBO=pp===0?fboA:fboB;
    gl.bindFramebuffer(gl.FRAMEBUFFER,rFBO);
    const b=new Float32Array(4);
    let mx=[0,0,0];
    const st=Math.floor(SIZE/8);
    for(let y=0;y<SIZE;y+=st)for(let x=0;x<SIZE;x+=st){
      gl.readPixels(x,y,1,1,gl.RGBA,gl.FLOAT,b);
      mx[0]=Math.max(mx[0],Math.abs(b[0]));
      mx[1]=Math.max(mx[1],Math.abs(b[1]));
      mx[2]=Math.max(mx[2],Math.abs(b[2]));
    }
    for(let c=0;c<3;c++){
      const nl=Math.log(1+mx[c]);
      logMax[c]=logMax[c]*0.8+nl*0.2;
      if(logMax[c]<0.01)logMax[c]=0.01;
    }
  }

  const multiDisc = document.getElementById('showpermap').checked;

  if (!multiDisc) {
    // Single disc — original behavior
    gl.bindFramebuffer(gl.FRAMEBUFFER,null);
    gl.viewport(0,0,canvas.width,canvas.height);
    setDispUniforms(srcTex, new Float32Array([1,1,1]), false, false);
    drawQ(dispProg);
    return;
  }

  // Multi-disc mode
  const layout = getLayout();

  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.clearColor(0,0,0,1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  const gridOn = document.getElementById('showgrid').checked;
  const cwVal = parseFloat(document.getElementById('colorwt').value)/100.0;
  const cwts = [
    [cwVal,1,1],[1,cwVal,1],[1,1,cwVal],
    [cwVal,cwVal,1],[cwVal,1,cwVal],[1,cwVal,cwVal]
  ];

  // Render gridded source once if grid is on
  let perTransformSrc = srcTex;
  if (gridOn) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, fboC);
    gl.viewport(0, 0, SIZE, SIZE);
    gl.useProgram(gridProg);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, srcTex);
    gl.uniform1i(gl.getUniformLocation(gridProg,'uD'), 0);
    gl.uniform1f(gl.getUniformLocation(gridProg,'sc'), SCALE);
    drawQ(gridProg);
    perTransformSrc = texC;
  }

  // Combined disc
  displayDisc(srcTex, layout.cells[0], new Float32Array([1,1,1]), gridOn);

  // Per-transform discs
  for (let t = 0; t < nFuncs; t++) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, fboT);
    gl.viewport(0, 0, SIZE, SIZE);
    gl.useProgram(iterProg);
    setIterUniforms(perTransformSrc, currentAng, t, 0);
    drawQ(iterProg);

    displayDisc(texT, layout.cells[t+1], new Float32Array(cwts[t]), false);
  }
}

/* ---- Events ---- */

document.getElementById('randomize').addEventListener('click', function(){
  for(let i=0;i<252;i++){baseAngles[i]=Math.random()*Math.PI*2; vels[i]=(Math.random()-0.5)*0.4; phases[i]=0;}
  resetImage();
});
document.getElementById('nfuncs').addEventListener('change', function(){
  nFuncs=parseInt(this.value); resetImage();
  if (document.getElementById('showpermap').checked) updateLabels();
});
document.getElementById('numdeg').addEventListener('change', function(){ resetImage(); });
document.getElementById('dendeg').addEventListener('change', function(){ resetImage(); });
document.getElementById('numexp').addEventListener('change', function(){ resetImage(); });
document.getElementById('denexp').addEventListener('change', function(){ resetImage(); });
document.getElementById('showpermap').addEventListener('change', function(){
  document.getElementById('gridlabel').style.display = this.checked ? '' : 'none';
  resize();
});

/* ---- Main loop ---- */

function loop(){
  const speedPct=document.getElementById('speed').value/100.0;
  const dt=1.0/60.0;
  for(let i=0;i<252;i++) phases[i]+=vels[i]*dt*speedPct;
  currentAng=new Float32Array(252);
  for(let i=0;i<252;i++) currentAng[i]=baseAngles[i]+phases[i];
  doIter(currentAng);
  display();
  if(frame%100===0){
    const rFBO=pp===0?fboA:fboB;
    gl.bindFramebuffer(gl.FRAMEBUFFER,rFBO);
    const b=new Float32Array(4); let s=[0,0,0],n=0;
    const st2=Math.floor(SIZE/8);
    for(let y=0;y<SIZE;y+=st2)for(let x=0;x<SIZE;x+=st2){
      gl.readPixels(x,y,1,1,gl.RGBA,gl.FLOAT,b);s[0]+=b[0];s[1]+=b[1];s[2]+=b[2];n++;
    }
    console.log('frame '+frame+': avg R='+(s[0]/n).toExponential(2)+' G='+(s[1]/n).toExponential(2)+' B='+(s[2]/n).toExponential(2)+' runAvg=['+runAvg[0].toFixed(3)+','+runAvg[1].toFixed(3)+','+runAvg[2].toFixed(3)+']');
    gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  }
  frame++;
  const now=performance.now(),el=now-lastT; lastT=now;
  fpsS=fpsS*0.95+(1000/el)*0.05;
  if(frame%30===0) document.getElementById('fps').textContent=fpsS.toFixed(0)+' fps';
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
