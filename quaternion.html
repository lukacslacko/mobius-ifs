<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Quaternion Möbius IFS — 3D</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; font-family: monospace; }
  canvas { display: block; position: absolute; top: 0; left: 0; }
  .controls {
    position: fixed; top: 10px; left: 10px; z-index: 10;
    background: rgba(0,0,0,0.7); padding: 10px 14px; border-radius: 6px;
    color: #aaa; font-size: 12px; display: flex; flex-direction: column; gap: 6px;
  }
  .controls label { cursor: pointer; white-space: nowrap; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .controls input[type=range] { width: 90px; }
  .controls select { background: #333; color: #aaa; border: 1px solid #555; border-radius: 3px; padding: 2px; }
  #fps { text-align: right; }
</style>
</head>
<body>
<div class="controls">
  <label>Funcs: <select id="nfuncs">
    <option value="1">1</option><option value="2">2</option>
    <option value="3" selected>3</option><option value="4">4</option>
    <option value="5">5</option><option value="6">6</option>
  </select></label>
  <label>Num°: <select id="numdeg">
    <option value="0">0</option><option value="1">1</option><option value="2" selected>2</option>
  </select></label>
  <label>Den°: <select id="dendeg">
    <option value="0">0</option><option value="1" selected>1</option><option value="2">2</option>
  </select></label>
  <label>Voxels: <select id="voxres">
    <option value="32">32</option><option value="48">48</option>
    <option value="64">64</option><option value="96">96</option>
    <option value="128">128</option><option value="192">192</option>
    <option value="256">256</option><option value="384" selected>384</option>
    <option value="512">512</option>
  </select></label>
  <label>Render: <select id="rendermode">
    <option value="volume">Volume</option>
    <option value="surface" selected>Surface</option>
  </select></label>
  <label id="densitylabel" style="display:none">Density: <input type="range" id="density" min="1" max="400" value="80"></label>
  <label id="gammalabel" style="display:none">Gamma: <input type="range" id="gamma" min="10" max="500" value="100"></label>
  <label id="thresholdlabel">Threshold: <input type="range" id="threshold" min="0" max="100" value="50"></label>
  <label><input type="checkbox" id="normq" checked> Normalize coefficients</label>
  <label>Color: <input type="range" id="colorwt" min="100" max="500" value="200"></label>
  <label>Speed: <input type="range" id="speed" min="0" max="200" value="25"></label>
  <button id="randomize">Randomize</button>
  <button id="export">Export params</button>
  <span id="fps"></span>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
}
resize();
window.addEventListener('resize', resize);

const gl = canvas.getContext('webgl2');
gl.getExtension('EXT_color_buffer_float');
gl.getExtension('OES_texture_float_linear');

let N = 384;

function makeTex3D(n, data) {
  const t = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_3D, t);
  gl.texImage3D(gl.TEXTURE_3D, 0, gl.RGBA32F, n, n, n, 0, gl.RGBA, gl.FLOAT, data);
  gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_WRAP_R, gl.CLAMP_TO_EDGE);
  return t;
}

function initTex3D(tex, n) {
  // Fill slice by slice to avoid huge allocation
  gl.bindTexture(gl.TEXTURE_3D, tex);
  gl.texImage3D(gl.TEXTURE_3D, 0, gl.RGBA32F, n, n, n, 0, gl.RGBA, gl.FLOAT, null);
  const slice = new Float32Array(n * n * 4);
  for (let iz = 0; iz < n; iz++) {
    const z = (iz + 0.5) / n * 2 - 1;
    for (let iy = 0; iy < n; iy++) {
      const y = (iy + 0.5) / n * 2 - 1;
      for (let ix = 0; ix < n; ix++) {
        const x = (ix + 0.5) / n * 2 - 1;
        const v = x*x + y*y + z*z < 1.0 ? 1.0 : 0.001;
        const j = (iy * n + ix) * 4;
        slice[j] = v; slice[j+1] = v; slice[j+2] = v; slice[j+3] = 1;
      }
    }
    gl.texSubImage3D(gl.TEXTURE_3D, 0, 0, 0, iz, n, n, 1, gl.RGBA, gl.FLOAT, slice);
  }
}

let texA = makeTex3D(N, null), texB = makeTex3D(N, null);
initTex3D(texA, N); initTex3D(texB, N);
const fbo = gl.createFramebuffer();

const qb = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, qb);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

function sh(s,t){const o=gl.createShader(t);gl.shaderSource(o,s);gl.compileShader(o);
  if(!gl.getShaderParameter(o,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(o));throw gl.getShaderInfoLog(o);}return o;}
function pr(v,f){const p=gl.createProgram();gl.attachShader(p,sh(v,gl.VERTEX_SHADER));
  gl.attachShader(p,sh(f,gl.FRAGMENT_SHADER));gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)){console.error(gl.getProgramInfoLog(p));}return p;}

const VS = `#version 300 es
in vec2 pos; out vec2 uv;
void main(){uv=pos*0.5+0.5;gl_Position=vec4(pos,0,1);}`;

const iterProg = pr(VS, `#version 300 es
precision highp float;
precision highp sampler3D;
in vec2 uv; out vec4 fragColor;
uniform sampler3D uD;
uniform float a[144]; // 24 per transform: 3 num quats + 3 den quats × 4 components
uniform float sliceZ;
uniform int nT;
uniform int numDeg;
uniform int denDeg;
uniform float cw;
uniform vec3 uScale;
uniform int normQ;

// Quaternion: vec4(real, i, j, k)
vec4 qmul(vec4 p, vec4 q) {
  return vec4(
    p.x*q.x - p.y*q.y - p.z*q.z - p.w*q.w,
    p.x*q.y + p.y*q.x + p.z*q.w - p.w*q.z,
    p.x*q.z - p.y*q.w + p.z*q.x + p.w*q.y,
    p.x*q.w + p.y*q.z - p.z*q.y + p.w*q.x
  );
}

vec4 qinv(vec4 q) {
  return vec4(q.x, -q.y, -q.z, -q.w) / max(dot(q, q), 1e-10);
}

vec4 getQ(int idx) {
  vec4 q = vec4(a[idx], a[idx+1], a[idx+2], a[idx+3]);
  if (normQ == 1) {
    float n = length(q);
    if (n > 1e-6) q /= n;
  }
  return q;
}

// Horner evaluation of quaternion polynomial: c0*p^deg + c1*p^{deg-1} + ... + c_deg
vec4 evalQPoly(vec4 p, int off, int deg) {
  vec4 r = getQ(off);
  for (int k = 1; k <= 2; k++) {
    if (k > deg) break;
    r = qmul(r, p) + getQ(off + k*4);
  }
  return r;
}

vec3 colorWeight(int t) {
  if(t==0) return vec3(cw,1.0,1.0);
  if(t==1) return vec3(1.0,cw,1.0);
  if(t==2) return vec3(1.0,1.0,cw);
  if(t==3) return vec3(cw,cw,1.0);
  if(t==4) return vec3(cw,1.0,cw);
  return vec3(1.0,cw,cw);
}

void main() {
  vec3 w = vec3(uv * 2.0 - 1.0, sliceZ * 2.0 - 1.0);
  if (dot(w,w) > 1.0) { fragColor = vec4(0.001,0.001,0.001,1); return; }

  vec4 wp = vec4(0.0, w); // pure quaternion

  vec3 acc = vec3(0.0);
  vec3 wTotal = vec3(0.0);

  for (int t = 0; t < 6; t++) {
    if (t >= nT) break;
    int base = t * 24;

    // Forward map: z = N(w) * D(w)^{-1}
    vec4 N = evalQPoly(wp, base, numDeg);
    vec4 D = evalQPoly(wp, base + 12, denDeg);
    vec4 result = qmul(N, qinv(D));

    // Project to pure quaternion (3D)
    vec3 z = result.yzw;
    float z2 = dot(z, z);
    if (z2 > 1.0 || z2 != z2) continue;

    // Jacobian weight ~ 1/|D(w)|^4
    float d2 = dot(D, D);
    float j = min(1.0 / max(d2 * d2, 1e-3), 50.0);

    vec3 s = z * 0.5 + 0.5;
    vec3 sampled = texture(uD, s).rgb;
    vec3 cwt = colorWeight(t);
    acc += sampled * j * cwt;
    wTotal += cwt;
  }

  vec3 v = vec3(
    wTotal.r > 0.0 ? acc.r / wTotal.r : 0.0,
    wTotal.g > 0.0 ? acc.g / wTotal.g : 0.0,
    wTotal.b > 0.0 ? acc.b / wTotal.b : 0.0
  );
  v = clamp(v * uScale, vec3(0.001), vec3(100.0));
  fragColor = vec4(v, 1.0);
}`);

const dispProg = pr(VS, `#version 300 es
precision highp float;
precision highp sampler3D;
in vec2 uv; out vec4 fragColor;
uniform sampler3D uVol;
uniform vec3 uCamPos;
uniform vec3 uCamRight;
uniform vec3 uCamUp;
uniform vec3 uCamFwd;
uniform float uDensity;
uniform float uGamma;
uniform float uFov;
uniform float uVoxSize;
uniform int uMode; // 0=volume, 1=surface
uniform float uThreshold;

vec2 sphereHit(vec3 ro, vec3 rd){
  float b = dot(ro, rd);
  float c = dot(ro, ro) - 1.0;
  float h = b*b - c;
  if(h < 0.0) return vec2(-1.0);
  h = sqrt(h);
  return vec2(-b-h, -b+h);
}

void main(){
  vec2 ndc = uv * 2.0 - 1.0;
  vec3 rd = normalize(uCamFwd + ndc.x * uCamRight * uFov + ndc.y * uCamUp * uFov);
  vec3 ro = uCamPos;

  vec2 t = sphereHit(ro, rd);
  if(t.y < 0.0){ fragColor = vec4(0,0,0,1); return; }

  float tNear = max(t.x, 0.0);
  float tFar = t.y;

  const int STEPS = 120;
  float dt = (tFar - tNear) / float(STEPS);
  float jitter = fract(sin(dot(gl_FragCoord.xy, vec2(127.1, 311.7))) * 43758.5453);
  tNear += jitter * dt;

  vec3 lightDir = normalize(vec3(0.5, 1.0, 0.3));
  float eps = uVoxSize;

  if (uMode == 1) {
    // Surface mode: stop at first voxel above threshold
    for(int i = 0; i < STEPS; i++){
      float tc = tNear + (float(i) + 0.5) * dt;
      vec3 pos = ro + rd * tc;
      vec3 uvw = pos * 0.5 + 0.5;
      vec3 d = texture(uVol, uvw).rgb;
      float dens = (d.r + d.g + d.b) / 3.0;
      if(dens < uThreshold) continue;

      // Compute gradient normal
      vec3 gr;
      gr.x = texture(uVol, uvw+vec3(eps,0,0)).r - texture(uVol, uvw-vec3(eps,0,0)).r;
      gr.y = texture(uVol, uvw+vec3(0,eps,0)).r - texture(uVol, uvw-vec3(0,eps,0)).r;
      gr.z = texture(uVol, uvw+vec3(0,0,eps)).r - texture(uVol, uvw-vec3(0,0,eps)).r;
      float gl2 = dot(gr, gr);
      vec3 c = d / max(dens, 0.001);
      if(gl2 > 0.0001){
        vec3 n = gr / sqrt(gl2);
        float diff = max(dot(n, lightDir), 0.0) * 0.7 + 0.3;
        float spec = pow(max(dot(reflect(-lightDir, n), -rd), 0.0), 16.0) * 0.3;
        c = c * diff + vec3(spec);
      }
      fragColor = vec4(pow(max(c, vec3(0.0)), vec3(0.45)), 1.0);
      return;
    }
    fragColor = vec4(0,0,0,1);
    return;
  }

  // Volume mode
  vec3 col = vec3(0.0);
  float alpha = 0.0;
  for(int i = 0; i < STEPS; i++){
    float tc = tNear + (float(i) + 0.5) * dt;
    vec3 pos = ro + rd * tc;
    vec3 uvw = pos * 0.5 + 0.5;

    vec3 d = texture(uVol, uvw).rgb;
    float dens = (d.r + d.g + d.b) / 3.0;
    if(dens < 0.01) continue;
    dens = pow(dens, uGamma);

    float a = 1.0 - exp(-dens * dt * uDensity);
    vec3 c = d / max(dens, 0.001);

    if(dens > 0.05){
      vec3 gr;
      gr.x = texture(uVol, uvw+vec3(eps,0,0)).r - texture(uVol, uvw-vec3(eps,0,0)).r;
      gr.y = texture(uVol, uvw+vec3(0,eps,0)).r - texture(uVol, uvw-vec3(0,eps,0)).r;
      gr.z = texture(uVol, uvw+vec3(0,0,eps)).r - texture(uVol, uvw-vec3(0,0,eps)).r;
      float gl2 = dot(gr, gr);
      if(gl2 > 0.0001){
        vec3 n = gr / sqrt(gl2);
        float diff = max(dot(n, lightDir), 0.0) * 0.6 + 0.4;
        c *= diff;
      }
    }

    col += (1.0 - alpha) * a * c;
    alpha += (1.0 - alpha) * a;
    if(alpha > 0.99) break;
  }

  col = pow(max(col, vec3(0.0)), vec3(0.45));
  fragColor = vec4(col, 1.0);
}`);

const sliceProg = pr(VS, `#version 300 es
precision highp float;
precision highp sampler3D;
in vec2 uv; out vec4 fragColor;
uniform sampler3D uVol;
uniform vec3 uSliceRight;
uniform vec3 uSliceUp;
uniform vec3 uLM;
void main(){
  vec2 c = uv - 0.5;
  if(dot(c,c) > 0.25){ fragColor=vec4(0,0,0,1); return; }
  vec3 tc = vec3(0.5) + uSliceRight * c.x + uSliceUp * c.y;
  if(any(lessThan(tc, vec3(0.0))) || any(greaterThan(tc, vec3(1.0)))){ fragColor=vec4(0,0,0,1); return; }
  vec3 d = texture(uVol, tc).rgb;
  vec3 v;
  v.r = uLM.r>0.001 ? pow(clamp(log(1.0+abs(d.r))/uLM.r,0.0,1.0),0.45) : 0.0;
  v.g = uLM.g>0.001 ? pow(clamp(log(1.0+abs(d.g))/uLM.g,0.0,1.0),0.45) : 0.0;
  v.b = uLM.b>0.001 ? pow(clamp(log(1.0+abs(d.b))/uLM.b,0.0,1.0),0.45) : 0.0;
  fragColor=vec4(v,1);
}`);

const sliceLogMax = new Float32Array([1,1,1]);

const NPARAMS = 144;
const baseAngles = new Float32Array(NPARAMS), vels = new Float32Array(NPARAMS), phases = new Float32Array(NPARAMS);
for (let i = 0; i < NPARAMS; i++) { baseAngles[i] = Math.random()*Math.PI*2; vels[i] = (Math.random()-0.5)*0.4; }

let nFuncs = 3, pp = 0, frame = 0, fpsS = 0, fpsLastTime = 0;
const runAvg = [1, 1, 1];

let camAz = 0, camEl = 0.3, camDist = 2.2, camAutoRot = true;

// Slice plane orientation (initially i-j plane: right=x, up=y)
let sliceRight = [1, 0, 0];
let sliceUp    = [0, 1, 0];

function rotateVec(v, axis, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  const d = v[0]*axis[0] + v[1]*axis[1] + v[2]*axis[2];
  const cr = [axis[1]*v[2]-axis[2]*v[1], axis[2]*v[0]-axis[0]*v[2], axis[0]*v[1]-axis[1]*v[0]];
  return [v[0]*c+cr[0]*s+axis[0]*d*(1-c), v[1]*c+cr[1]*s+axis[1]*d*(1-c), v[2]*c+cr[2]*s+axis[2]*d*(1-c)];
}

let mDown = false, mLX, mLY, mOnSlice = false;

function getViewportSize() {
  return Math.min(Math.floor(canvas.width / 2), canvas.height);
}

canvas.addEventListener('mousedown', e => {
  mDown = true; mLX = e.clientX; mLY = e.clientY;
  const s = getViewportSize();
  mOnSlice = e.clientX >= s;
  if (!mOnSlice) camAutoRot = false;
});
window.addEventListener('mouseup', () => mDown = false);
canvas.addEventListener('mousemove', e => {
  if (!mDown) return;
  const dx = e.clientX - mLX, dy = e.clientY - mLY;
  mLX = e.clientX; mLY = e.clientY;
  if (mOnSlice) {
    // Rotate slice plane: horizontal drag → rotate around sliceUp, vertical → around sliceRight
    if (Math.abs(dx) > 0) {
      sliceRight = rotateVec(sliceRight, sliceUp, -dx * 0.01);
    }
    if (Math.abs(dy) > 0) {
      sliceUp = rotateVec(sliceUp, sliceRight, dy * 0.01);
      sliceRight = rotateVec(sliceRight, sliceRight, 0); // no-op, just for symmetry
    }
    // Re-orthonormalize
    sliceRight = norm3(sliceRight);
    const n = cross3(sliceRight, sliceUp);
    sliceUp = norm3(cross3(norm3(n), sliceRight));
  } else {
    camAz -= dx * 0.01;
    camEl = Math.max(-1.2, Math.min(1.2, camEl + dy * 0.01));
  }
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  camDist = Math.max(1.2, Math.min(6.0, camDist * (1 + e.deltaY * 0.001)));
}, {passive: false});
canvas.addEventListener('dblclick', () => { camAutoRot = true; });

function drawQ(p) {
  const a = gl.getAttribLocation(p, 'pos');
  gl.bindBuffer(gl.ARRAY_BUFFER, qb);
  gl.enableVertexAttribArray(a);
  gl.vertexAttribPointer(a, 2, gl.FLOAT, false, 0, 0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

let quantileThreshold = 0.1;

function resetImage() {
  frame = 0; runAvg[0] = 1; runAvg[1] = 1; runAvg[2] = 1;
  initTex3D(texA, N); initTex3D(texB, N);
}

function changeResolution(newN) {
  N = newN;
  gl.deleteTexture(texA); gl.deleteTexture(texB);
  texA = makeTex3D(N, null); texB = makeTex3D(N, null);
  initTex3D(texA, N); initTex3D(texB, N);
  frame = 0; pp = 0; runAvg[0] = 1; runAvg[1] = 1; runAvg[2] = 1;
}

function doIter(ang) {
  const readTex = pp === 0 ? texA : texB;
  const writeTex = pp === 0 ? texB : texA;

  gl.useProgram(iterProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_3D, readTex);
  gl.uniform1i(gl.getUniformLocation(iterProg, 'uD'), 0);
  gl.uniform1fv(gl.getUniformLocation(iterProg, 'a'), ang);
  gl.uniform1i(gl.getUniformLocation(iterProg, 'nT'), nFuncs);
  gl.uniform1i(gl.getUniformLocation(iterProg, 'numDeg'), parseInt(document.getElementById('numdeg').value));
  gl.uniform1i(gl.getUniformLocation(iterProg, 'denDeg'), parseInt(document.getElementById('dendeg').value));
  gl.uniform1f(gl.getUniformLocation(iterProg, 'cw'), document.getElementById('colorwt').value / 100.0);
  gl.uniform1i(gl.getUniformLocation(iterProg, 'normQ'), document.getElementById('normq').checked ? 1 : 0);
  gl.uniform3fv(gl.getUniformLocation(iterProg, 'uScale'), runAvg);

  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.viewport(0, 0, N, N);

  const sliceZLoc = gl.getUniformLocation(iterProg, 'sliceZ');
  for (let z = 0; z < N; z++) {
    gl.framebufferTextureLayer(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, writeTex, 0, z);
    gl.uniform1f(sliceZLoc, (z + 0.5) / N);
    drawQ(iterProg);
  }

  if (frame % 3 === 0) {
    const midZ = Math.floor(N / 2);
    gl.framebufferTextureLayer(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, writeTex, 0, midZ);
    const sz = 8, ox = Math.floor((N - sz) / 2);
    const buf = new Float32Array(sz * sz * 4);
    gl.readPixels(ox, ox, sz, sz, gl.RGBA, gl.FLOAT, buf);
    let sums = [0, 0, 0], cnt = 0;
    for (let i = 0; i < sz * sz; i++) {
      const r = buf[i*4], g = buf[i*4+1], b = buf[i*4+2];
      if (isFinite(r) && isFinite(g) && isFinite(b)) { sums[0] += r; sums[1] += g; sums[2] += b; cnt++; }
    }
    if (cnt > 0 && (sums[0]+sums[1]+sums[2]) > 0.001*cnt) {
      for (let c = 0; c < 3; c++) {
        const avg = sums[c] / cnt;
        if (!isFinite(avg)) { resetImage(); pp = 1 - pp; return; }
        const desired = avg > 1e-10 ? Math.min(0.5/avg, 10.0) : 1.0;
        runAvg[c] = runAvg[c] * 0.95 + desired * 0.05;
      }
    } else if (frame > 10) { resetImage(); pp = 1 - pp; return; }

    // Histogram for quantile threshold — sample a sparse grid across 3 slices
    const samples = [];
    const step = Math.max(Math.floor(N / 16), 1);
    const slices = [Math.floor(N*0.25), midZ, Math.floor(N*0.75)];
    for (const sz2 of slices) {
      gl.framebufferTextureLayer(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, writeTex, 0, sz2);
      const row = new Float32Array(N * 4);
      for (let y = 0; y < N; y += step) {
        gl.readPixels(0, y, N, 1, gl.RGBA, gl.FLOAT, row);
        for (let x = 0; x < N; x += step) {
          const lum = (row[x*4] + row[x*4+1] + row[x*4+2]) / 3;
          if (isFinite(lum) && lum > 0.01) samples.push(lum);
        }
      }
    }
    if (samples.length > 10) {
      samples.sort((a, b) => a - b);
      const pct = document.getElementById('threshold').value / 100;
      const idx = Math.min(Math.floor(pct * samples.length), samples.length - 1);
      const target = samples[idx];
      quantileThreshold = quantileThreshold * 0.7 + target * 0.3;
    }
  }

  pp = 1 - pp;
}

function norm3(v) { const l = Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]); return [v[0]/l, v[1]/l, v[2]/l]; }
function cross3(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }

function display() {
  const w = canvas.width, h = canvas.height;
  const s = Math.min(Math.floor(w / 2), h);
  const srcTex = pp === 0 ? texA : texB;

  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.clearColor(0,0,0,1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  // Left: 3D ray-marched volume
  const cp = [
    Math.sin(camAz) * Math.cos(camEl) * camDist,
    Math.sin(camEl) * camDist,
    Math.cos(camAz) * Math.cos(camEl) * camDist
  ];
  const fwd = norm3([-cp[0], -cp[1], -cp[2]]);
  const right = norm3(cross3(fwd, [0, 1, 0]));
  const up = cross3(right, fwd);

  gl.viewport(0, Math.floor((h - s) / 2), s, s);
  gl.useProgram(dispProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_3D, srcTex);
  gl.uniform1i(gl.getUniformLocation(dispProg, 'uVol'), 0);
  gl.uniform3fv(gl.getUniformLocation(dispProg, 'uCamPos'), cp);
  gl.uniform3fv(gl.getUniformLocation(dispProg, 'uCamRight'), right);
  gl.uniform3fv(gl.getUniformLocation(dispProg, 'uCamUp'), up);
  gl.uniform3fv(gl.getUniformLocation(dispProg, 'uCamFwd'), fwd);
  gl.uniform1f(gl.getUniformLocation(dispProg, 'uDensity'), document.getElementById('density').value / 10.0);
  gl.uniform1f(gl.getUniformLocation(dispProg, 'uGamma'), document.getElementById('gamma').value / 100.0);
  gl.uniform1f(gl.getUniformLocation(dispProg, 'uFov'), 1.0 / camDist);
  gl.uniform1f(gl.getUniformLocation(dispProg, 'uVoxSize'), 1.0 / N);
  const surfMode = document.getElementById('rendermode').value === 'surface' ? 1 : 0;
  gl.uniform1i(gl.getUniformLocation(dispProg, 'uMode'), surfMode);
  gl.uniform1f(gl.getUniformLocation(dispProg, 'uThreshold'), quantileThreshold);
  drawQ(dispProg);

  // Right: i-j plane slice (k=0, i.e. z=0.5 in texture coords)
  // Update slice log-max from a few samples
  if (frame % 10 === 0) {
    const midZ = Math.floor(N / 2);
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
    gl.framebufferTextureLayer(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, srcTex, 0, midZ);
    const buf = new Float32Array(4);
    let mx = [0,0,0];
    const st = Math.floor(N / 8);
    for (let y = 0; y < N; y += st) for (let x = 0; x < N; x += st) {
      gl.readPixels(x, y, 1, 1, gl.RGBA, gl.FLOAT, buf);
      mx[0] = Math.max(mx[0], Math.abs(buf[0]));
      mx[1] = Math.max(mx[1], Math.abs(buf[1]));
      mx[2] = Math.max(mx[2], Math.abs(buf[2]));
    }
    for (let c = 0; c < 3; c++) {
      const nl = Math.log(1 + mx[c]);
      sliceLogMax[c] = sliceLogMax[c] * 0.8 + nl * 0.2;
      if (sliceLogMax[c] < 0.01) sliceLogMax[c] = 0.01;
    }
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  }

  gl.viewport(s, Math.floor((h - s) / 2), s, s);
  gl.useProgram(sliceProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_3D, srcTex);
  gl.uniform1i(gl.getUniformLocation(sliceProg, 'uVol'), 0);
  gl.uniform3fv(gl.getUniformLocation(sliceProg, 'uSliceRight'), sliceRight);
  gl.uniform3fv(gl.getUniformLocation(sliceProg, 'uSliceUp'), sliceUp);
  gl.uniform3fv(gl.getUniformLocation(sliceProg, 'uLM'), sliceLogMax);
  drawQ(sliceProg);
}

document.getElementById('randomize').addEventListener('click', function(){
  for(let i=0;i<NPARAMS;i++){baseAngles[i]=Math.random()*Math.PI*2;vels[i]=(Math.random()-0.5)*0.4;phases[i]=0;}
  resetImage();
});
document.getElementById('nfuncs').addEventListener('change', function(){
  nFuncs = parseInt(this.value); resetImage();
});
document.getElementById('numdeg').addEventListener('change', function(){ resetImage(); });
document.getElementById('dendeg').addEventListener('change', function(){ resetImage(); });
document.getElementById('voxres').addEventListener('change', function(){
  changeResolution(parseInt(this.value));
});
document.getElementById('rendermode').addEventListener('change', function(){
  document.getElementById('densitylabel').style.display = this.value === 'volume' ? '' : 'none';
  document.getElementById('gammalabel').style.display = this.value === 'volume' ? '' : 'none';
  document.getElementById('thresholdlabel').style.display = this.value === 'surface' ? '' : 'none';
  document.getElementById('export').style.display = this.value === 'surface' ? '' : 'none';
});
document.getElementById('export').addEventListener('click', function(){
  const ang = new Float32Array(NPARAMS);
  for (let i = 0; i < NPARAMS; i++) ang[i] = Math.sin(baseAngles[i] + phases[i]);
  const params = {
    version: 1,
    nT: nFuncs,
    numDeg: parseInt(document.getElementById('numdeg').value),
    denDeg: parseInt(document.getElementById('dendeg').value),
    normalize: document.getElementById('normq').checked,
    colorWeight: document.getElementById('colorwt').value / 100.0,
    thresholdPct: parseInt(document.getElementById('threshold').value),
    camAz: camAz,
    camEl: camEl,
    camDist: camDist,
    ang: Array.from(ang)
  };
  const blob = new Blob([JSON.stringify(params, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'fractal_params.json'; a.click();
  URL.revokeObjectURL(url);
});

function loop() {
  const speedPct = document.getElementById('speed').value / 2000.0;
  const dt = 1.0 / 60.0;
  for (let i = 0; i < NPARAMS; i++) phases[i] += vels[i] * dt * speedPct;
  if (camAutoRot) camAz += dt * 0.3;

  const ang = new Float32Array(NPARAMS);
  for (let i = 0; i < NPARAMS; i++) ang[i] = Math.sin(baseAngles[i] + phases[i]);

  doIter(ang);
  display();

  frame++;
  if (frame % 30 === 0) {
    gl.finish();
    const now = performance.now();
    if (fpsLastTime > 0) fpsS = 30000 / (now - fpsLastTime);
    fpsLastTime = now;
    document.getElementById('fps').textContent = fpsS.toFixed(0) + ' fps';
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
